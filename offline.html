<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020812" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <title>لا يوجد اتصال | بوابة الموارد البشرية</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#020812;color:#f4fbff;font-family:Arial,sans-serif;text-align:center}
    main{width:min(100%,520px);padding:36px 24px;border:1px solid rgba(24,191,255,.24);border-radius:24px;background:rgba(7,24,38,.78);box-shadow:0 0 48px rgba(24,191,255,.12)}
    .icon{width:72px;height:72px;margin:0 auto 22px;display:grid;place-items:center;border-radius:22px;border:1px solid rgba(24,191,255,.42);color:#18bfff;font-size:34px;box-shadow:0 0 28px rgba(24,191,255,.2)}
    h1{margin:0;font-size:clamp(1.15rem,5vw,1.55rem);line-height:1.8}
    p{margin:12px 0 24px;color:#a8b3c7;line-height:1.9}
    .actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
    .action{min-height:44px;padding:11px 18px;border-radius:12px;border:1px solid rgba(24,191,255,.42);font:700 1rem Arial,sans-serif;cursor:pointer;text-decoration:none}
    button.action{background:#18bfff;color:#020812}.action.secondary{background:transparent;color:#f4fbff}
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">⌁</div>
    <h1>تعذر الاتصال بالإنترنت</h1>
    <p>تحقق من اتصال الشبكة، ثم أعد المحاولة. يمكنك أيضاً العودة إلى النسخة المحفوظة من بوابة الموارد البشرية.</p>
    <div class="actions">
      <button class="action" type="button" onclick="window.location.reload()">إعادة المحاولة</button>
      <a class="action secondary" href="index.html">العودة إلى البوابة</a>
    </div>
  </main>
</body>
</html>
